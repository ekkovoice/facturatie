name: Maandelijkse facturatie

on:
  schedule:
    - cron: '0 7 9 * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Testmodus: geen SEPA, mail naar test-adres, draait ongeacht de dag'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  facturatie:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Systeemafhankelijkheden weasyprint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 libharfbuzz0b libfontconfig1 libgdk-pixbuf-2.0-0 fonts-liberation

      - name: Python packages installeren
        run: pip install -r requirements.txt

      - name: Facturatie uitvoeren
        env:
          MOLLIE_API_KEY: ${{ secrets.MOLLIE_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          BILLING_DRY_RUN: ${{ github.event.inputs.test_mode == 'true' && '1' || '' }}
          BILLING_TEST_EMAIL: ${{ github.event.inputs.test_mode == 'true' && 'enesdere02@gmail.com' || '' }}
          BILLING_FORCE: ${{ github.event.inputs.test_mode == 'true' && '1' || '' }}
        run: python run_billing.py

      - name: Facturen en teller opslaan in repo
        if: github.event.inputs.test_mode != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: factuur verstuurd + teller bijgewerkt"
          file_pattern: factuur_teller.json facturen/*.pdf
